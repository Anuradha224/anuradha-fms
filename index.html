<title>Anuradha Textile — FMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#4F46E5;--indigo2:#4338CA;--indigo3:#3730A3;
  --indigo-light:#EEF2FF;--indigo-mid:#C7D2FE;
  --bg:#F9FAFB;--bg2:#FFFFFF;--bg3:#F3F4F6;--bg4:#E5E7EB;
  --border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#374151;--text3:#6B7280;--text4:#9CA3AF;
  --green:#059669;--green-bg:#ECFDF5;--green-bd:#A7F3D0;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-bd:#FCD34D;
  --red:#DC2626;--red-bg:#FEF2F2;--red-bd:#FCA5A5;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-bd:#DDD6FE;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --r:8px;--rlg:12px;--rxl:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s}
input,select,textarea{font-family:inherit;outline:none}
.hidden{display:none!important}
a{color:var(--indigo);text-decoration:none}

/* ── LOGIN ── */
#login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#EEF2FF 0%,#F9FAFB 40%,#F0FDF4 100%)
}
.login-card{
  background:#fff;border-radius:24px;padding:36px 32px;
  width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(79,70,229,.12),0 4px 16px rgba(0,0,0,.06)
}
.login-brand{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.login-logo{width:80px;height:80px;border-radius:20px;object-fit:contain;
  background:#fff;padding:6px;box-shadow:var(--shadow-md);border:1.5px solid var(--border)}
.login-name{font-size:20px;font-weight:700;color:var(--text);margin-top:12px;letter-spacing:-.3px}
.login-sub{font-size:13px;color:var(--text3);margin-top:2px}
.login-section-label{font-size:11px;font-weight:600;color:var(--text4);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.user-cards{display:flex;flex-direction:column;gap:8px}
.user-card{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--rlg);cursor:pointer;transition:all .15s
}
.user-card:hover{background:var(--indigo-light);border-color:var(--indigo);
  transform:translateY(-1px);box-shadow:var(--shadow-md)}
.user-avatar{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0
}
.user-card-info{flex:1}
.user-card-name{font-size:14px;font-weight:600;color:var(--text)}
.user-card-role{font-size:11px;color:var(--text3);margin-top:1px}
.user-card-arrow{color:var(--text4);font-size:18px;font-weight:300}

/* PIN Screen */
.pin-screen{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.pin-avatar{width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;margin-bottom:10px}
.pin-who{font-size:18px;font-weight:700;color:var(--text)}
.pin-sub{font-size:13px;color:var(--text3);margin:4px 0 20px}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--border2);transition:all .2s;border:2px solid var(--border2)
}
.pin-dot.filled{background:var(--indigo);border-color:var(--indigo);transform:scale(1.1)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:250px}
.pin-key{
  background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);padding:16px;border-radius:var(--rlg);
  font-size:20px;font-weight:600;text-align:center;transition:all .1s
}
.pin-key:hover{background:var(--indigo-light);border-color:var(--indigo);color:var(--indigo)}
.pin-key:active{transform:scale(.92);background:var(--indigo);color:#fff}
.pin-err{font-size:12px;color:var(--red);min-height:18px;margin-top:8px;text-align:center;font-weight:500}
.pin-back{
  background:transparent;color:var(--text3);font-size:13px;
  margin-top:14px;padding:8px 16px;border-radius:var(--r);
  border:1.5px solid var(--border);font-weight:500
}
.pin-back:hover{background:var(--bg3);color:var(--text)}

/* ── APP LAYOUT ── */
#app-page{display:flex;flex-direction:column;min-height:100vh}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;height:56px;background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:99;gap:6px;
  box-shadow:0 1px 3px rgba(0,0,0,.05)
}
.topbar-brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden}
.topbar-logo{width:30px;height:30px;border-radius:8px;object-fit:contain;
  border:1px solid var(--border);flex-shrink:0}
.topbar-name{font-size:14px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
.topbar-name span{color:var(--indigo)}
.type-toggle{display:flex;background:var(--bg3);border-radius:8px;
  padding:3px;border:1px solid var(--border);gap:2px;flex-shrink:0}
.type-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;
  border:none;background:transparent;color:var(--text3);white-space:nowrap;transition:all .15s}
.type-btn.active{background:var(--indigo);color:#fff;box-shadow:var(--shadow-sm)}

.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sync-pill{
  display:flex;align-items:center;gap:4px;
  font-size:10px;color:var(--text3);
  background:var(--bg3);padding:3px 8px;border-radius:20px;
  border:1px solid var(--border);white-space:nowrap
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:blink .7s ease-in-out infinite}
.sync-dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.user-pill{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:500;color:var(--text2);
  background:var(--bg3);padding:4px 8px;border-radius:20px;
  border:1px solid var(--border);white-space:nowrap
}
.user-pill-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.btn-signout{
  font-size:11px;color:var(--text3);background:transparent;
  padding:4px 8px;border-radius:var(--r);border:1.5px solid var(--border);
  font-weight:500;white-space:nowrap
}
.btn-signout:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}

/* NAV */
.nav{
  display:flex;background:#fff;border-bottom:1px solid var(--border);
  padding:0 16px;overflow-x:auto;gap:0
}
.nav-item{
  padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);
  border:none;background:transparent;white-space:nowrap;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s
}
.nav-item.active{color:var(--indigo);border-bottom-color:var(--indigo);font-weight:600}
.nav-item:hover:not(.active){color:var(--text2);background:var(--bg3)}

/* CONTENT */
.content{padding:16px;max-width:1100px;margin:0 auto;width:100%}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--rlg);
  padding:12px 12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--indigo)
}
.stat-card.green::before{background:var(--green)}
.stat-card.amber::before{background:var(--amber)}
.stat-card.red::before{background:var(--red)}
.stat-label{font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;line-height:1.3}
.stat-value{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:10px;color:var(--text4);margin-top:3px}

/* CARD */
.card{background:#fff;border:1px solid var(--border);
  border-radius:var(--rlg);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;
  border-radius:20px;font-size:11px;font-weight:600;gap:3px}
.b-indigo{background:var(--indigo-light);color:var(--indigo)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-gray{background:var(--bg4);color:var(--text3)}
.b-blue{background:var(--blue-bg);color:var(--blue)}

/* PO CARD */
.po-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--rlg);margin-bottom:10px;overflow:hidden;
  box-shadow:var(--shadow-sm);transition:all .15s
}
.po-card:hover{border-color:var(--indigo-mid);box-shadow:var(--shadow-md)}
.po-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 16px;cursor:pointer;gap:8px;transition:background .15s
}
.po-header:hover{background:var(--bg3)}
.po-num{font-size:15px;font-weight:700;color:var(--text);font-family:ui-monospace,monospace}
.po-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.po-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.po-meta-item{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.po-chevron{
  color:var(--text4);font-size:14px;flex-shrink:0;margin-top:4px;
  transition:transform .2s;line-height:1
}
.po-chevron.open{transform:rotate(180deg)}
.po-body{
  padding:14px 16px;border-top:1px solid var(--border);
  background:var(--bg3)
}
.partial-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:6px;overflow:hidden}
.partial-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}

/* STEP ITEMS */
.step-list{display:flex;flex-direction:column;gap:6px}
.step-item{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r);transition:all .15s
}
.step-item:hover{border-color:var(--indigo-mid)}
.step-circle{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0
}
.sc-done{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-bd)}
.sc-late{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd)}
.sc-pending{background:var(--bg3);color:var(--text4);border:1.5px solid var(--border)}
.step-name{font-size:13px;font-weight:600;color:var(--text)}
.step-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;flex-wrap:wrap;gap:8px}
.step-remark{font-size:11px;color:var(--text3);margin-top:3px;
  background:var(--bg3);padding:4px 8px;border-radius:5px;display:inline-block}
.step-lock{font-size:10px;color:var(--text4);margin-top:2px;
  display:flex;align-items:center;gap:3px}

/* BUTTONS */
.btn{
  padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:600;
  cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap
}
.btn-primary{background:var(--indigo);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--indigo2);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-success{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-bd)}
.btn-success:hover{background:var(--green-bd)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd)}
.btn-danger:hover{background:var(--red-bd)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1.5px solid var(--amber-bd)}
.btn-amber:hover{background:var(--amber-bd)}
.btn-ghost{background:#fff;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}

/* MODAL */
.overlay{
  position:fixed;inset:0;background:rgba(17,24,39,.5);
  backdrop-filter:blur(4px);display:flex;align-items:center;
  justify-content:center;z-index:200;padding:16px
}
.modal{
  background:#fff;border-radius:var(--rxl);width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 25px 50px rgba(0,0,0,.15),0 10px 20px rgba(0,0,0,.1)
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;
}
.modal-ttl{font-size:16px;font-weight:700;color:var(--text)}
.modal-cls{
  background:var(--bg3);color:var(--text3);width:28px;height:28px;
  border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center
}
.modal-cls:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px}
.modal-ftr{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;background:#fff;
  position:sticky;bottom:0
}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.lbl{font-size:12px;color:var(--text2);font-weight:600}
.inp{
  width:100%;background:#fff;border:1.5px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:var(--r);
  font-size:14px;transition:border .15s;box-shadow:var(--shadow-sm)
}
.inp:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
select.inp{appearance:none;cursor:pointer}

/* ALERTS */
.alert{
  padding:10px 14px;border-radius:var(--r);font-size:12px;
  margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;
  font-weight:500
}
.alert-warn{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.alert-danger{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.alert-info{background:var(--indigo-light);border:1px solid var(--indigo-mid);color:var(--indigo)}
.alert-success{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}

/* CHECKLIST */
.cl-item{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);gap:10px
}
.cl-item:last-child{border-bottom:none}
.cl-q-en{font-size:12px;font-weight:500;color:var(--text)}
.cl-q-hi{font-size:11px;color:var(--text3);margin-top:2px}
.cl-btns{display:flex;gap:6px;flex-shrink:0}
.cl-btn{
  padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer
}
.cl-btn.yes.active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.cl-btn.no.active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

/* FILE UPLOAD */
.file-area{
  border:2px dashed var(--border2);border-radius:var(--rlg);
  padding:20px;text-align:center;cursor:pointer;color:var(--text3);
  font-size:12px;display:block;transition:all .15s;background:var(--bg3)
}
.file-area:hover{border-color:var(--indigo);background:var(--indigo-light);color:var(--indigo)}
.file-area.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{
  text-align:left;padding:8px 12px;background:var(--bg3);
  color:var(--text3);font-size:10px;text-transform:uppercase;
  letter-spacing:.07em;border-bottom:1.5px solid var(--border);font-weight:700
}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}

/* SEARCH & FILTER BAR */
.filter-bar{
  display:flex;flex-direction:column;gap:8px;margin-bottom:14px
}
.filter-bar-top{display:flex;align-items:center;gap:8px}
.search-inp{
  flex:1;background:#fff;border:1.5px solid var(--border);
  color:var(--text);padding:9px 12px 9px 12px;border-radius:var(--r);
  font-size:13px;transition:border .15s;box-shadow:var(--shadow-sm)
}
.search-inp:focus{border-color:var(--indigo);outline:none;
  box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.search-inp::placeholder{color:var(--text4)}
.filter-tabs{
  display:flex;background:var(--bg3);border-radius:8px;
  padding:3px;border:1px solid var(--border);gap:2px;width:100%
}
.filter-tab{
  flex:1;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:600;
  border:none;background:transparent;color:var(--text3);cursor:pointer;
  white-space:nowrap;transition:all .15s;text-align:center
}
.filter-tab.active{background:#fff;color:var(--indigo);box-shadow:var(--shadow-sm)}

/* MISC */
.flex{display:flex;align-items:center}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.section-lbl{font-size:10px;font-weight:700;color:var(--text4);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.empty{text-align:center;padding:48px 20px;color:var(--text4)}
.empty-icon{font-size:36px;margin-bottom:8px}

/* SPINNER / LOADING */
.spinner{
  display:inline-block;width:18px;height:18px;
  border:2px solid var(--border2);border-top-color:var(--indigo);
  border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;
  gap:10px;padding:48px;color:var(--text3);font-size:13px}

/* MIS SCORES */
.score-good{color:var(--green);font-weight:700;font-family:monospace}
.score-bad{color:var(--red);font-weight:700;font-family:monospace}
.score-zero{color:var(--text3);font-family:monospace}

/* RECEIVING HISTORY */
.rcv-item{
  display:flex;flex-direction:column;gap:4px;
  padding:10px 12px;background:#fff;border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:6px
}

/* INSTALL BANNER */
#install-btn{
  display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--indigo);color:#fff;padding:12px 24px;border-radius:30px;
  font-size:13px;font-weight:600;align-items:center;gap:8px;cursor:pointer;
  z-index:998;box-shadow:0 8px 24px rgba(79,70,229,.4);white-space:nowrap;
  border:none;animation:slideUp .3s ease
}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}}

/* TOAST */
#toast-root{position:fixed;bottom:20px;right:16px;z-index:999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{
  padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);max-width:280px;pointer-events:all;
  animation:slideInRight .2s ease
}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}}

@media(max-width:580px){
  .form-row{grid-template-columns:1fr}
  .content{padding:10px}
  .topbar{padding:0 10px;height:52px}
  .topbar-name{font-size:13px}
  .stats-grid{gap:6px}
  .stat-card{padding:10px 8px}
  .stat-value{font-size:20px}
  .stat-label{font-size:8px}
  .sync-pill{display:none}
  .nav-item{padding:10px 12px;font-size:12px}
}
</style>

var SB_URL = 'https://rqokafvrlkpwmwwctcta.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxb2thZnZybGtwd213d2N0Y3RhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTkzNzczOCwiZXhwIjoyMDk1NTEzNzM4fQ.vnxNaQhp6-PSC1-82dv_hHIMFSpeFT45SjJ1-HpH7sE';

function sbFetch(method, path, body) {
  return fetch(SB_URL + '/rest/v1/' + path, {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
    if (r.status === 204) return null;
    return r.json();
  });
}

// Map DB row to frontend PO object
function mapPO(r){
  return{
    id:r.id, type:r.type, poNo:r.po_no, vendor:r.vendor,
    totalQty:r.total_qty, leadDays:r.lead_days,
    entryDate:r.entry_date, entryBy:r.entry_by,
    status:r.status, planned:r.planned||{},
    steps:r.steps||{}, receivings:r.receivings||[],
    cancelledQty:r.cancelled_qty||0, cancelRemark:r.cancel_remark||''
  };
}

async function loadData(silent) {
  try {
    setSyncing(true);
    var [rows, vrows] = await Promise.all([
      sbFetch('GET', 'pos?type=eq.' + S.fmsType + '&order=created_at.desc'),
      sbFetch('GET', 'vendors?type=eq.' + S.fmsType + '&order=name.asc&select=name')
    ]);
    S.pos     = rows.map(mapPO);
    S.vendors = vrows.map(function(r) { return r.name; });
    setSynced();
    if (!silent) render(); else renderSilent();
  } catch(e) { setSyncError(); console.error(e); }
}

async function autoSync() {
  try {
    var [rows, vrows] = await Promise.all([
      sbFetch('GET', 'pos?type=eq.' + S.fmsType + '&order=created_at.desc'),
      sbFetch('GET', 'vendors?type=eq.' + S.fmsType + '&order=name.asc&select=name')
    ]);
    S.pos     = rows.map(mapPO);
    S.vendors = vrows.map(function(r) { return r.name; });
    setSynced();
    renderSilent();
  } catch(e) { setSyncError(); }
}

async function dbCreatePO(po) {
  setSyncing(true);
  var r = await sbFetch('POST', 'pos', {
    type: po.type, po_no: po.poNo, vendor: po.vendor,
    total_qty: po.totalQty, lead_days: po.leadDays,
    entry_date: po.entryDate, entry_by: po.entryBy,
    status: 'active', planned: po.planned, steps: po.steps,
    receivings: po.receivings, cancelled_qty: 0, cancel_remark: ''
  });
  return r[0];
}

  if (patch.leadDays     !== undefined) dbPatch.lead_days     = patch.leadDays;
  if (patch.status       !== undefined) dbPatch.status        = patch.status;
  if (patch.planned      !== undefined) dbPatch.planned       = patch.planned;
  if (patch.steps        !== undefined) dbPatch.steps         = patch.steps;
  if (patch.receivings   !== undefined) dbPatch.receivings    = patch.receivings;

// DATE HELPERS
// ══════════════════════════════════════════════════════════════
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function setHM(d,h,m){var r=new Date(d);r.setHours(h,m,0,0);return r;}
function calcPlanned(entryDate,leadDays){
  var po=new Date(entryDate),del=addDays(po,leadDays);
  return{'1':setHM(po,18,0).toISOString(),'2':setHM(addDays(del,-2),9,0).toISOString(),
    '3':setHM(del,9,0).toISOString(),'5':null,'6':null};
}
function calcPostRcv(rcvDate){
  return{'5':setHM(new Date(rcvDate),21,0).toISOString(),
    '6':setHM(addDays(new Date(rcvDate),1),20,0).toISOString()};
}
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(iso){
  if(!iso)return'—';
  var d=new Date(iso),h=d.getHours(),ampm=h>=12?'PM':'AM',hh=h%12||12,mm=String(d.getMinutes()).padStart(2,'0');
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+hh+':'+mm+' '+ampm;
}
function fmtDate(iso){
  if(!iso)return'—';
  var d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function isLate(pl,actual){
  if(!pl)return false;
  return(actual?new Date(actual):new Date())>new Date(pl);
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    danger:['#fff5f5','#c92a2a','#ffc9c9'],

  var c=colors[type]||colors.info;
  el.style.cssText='background:'+c[0]+';color:'+c[1]+';border:1.5px solid '+c[2]+
    ';padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;'+
    'box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:280px;animation:slideIn .2s ease';
  el.textContent=msg;

}

function updateStats(){
  var myPending=0,overdue=0;
  S.pos.forEach(function(p){
    if(p.status==='cancelled')return;
    STEPS.forEach(function(sd){
      var step=p.steps[sd.code];
      if(step&&step.done)return;
      if(USERS[S.user].steps.indexOf(sd.code)>=0)myPending++;
      if(isLate(p.planned[sd.code],null))overdue++;
    });
  });
  var el1=document.getElementById('stat-total');
  var el2=document.getElementById('stat-pending');
  var el3=document.getElementById('stat-overdue');
  if(el1)el1.textContent=S.pos.length;
  if(el2){el2.textContent=myPending;el2.style.color=myPending?'var(--amber)':'var(--green)';}
  if(el3){el3.textContent=overdue;el3.style.color=overdue?'var(--red)':'var(--green)';}
}

function buildPOList(){
  var filtered=S.pos.filter(function(p){
    if(S.dashFilter==='active'){
      if(p.status==='cancelled')return false;
      if(STEPS.every(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}))return false;
    }
    if(S.dashFilter==='complete'){
      if(p.status==='cancelled')return false;
      if(!STEPS.every(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}))return false;
    }
    if(S.dashFilter==='cancelled'&&p.status!=='cancelled')return false;
    var q=S.dashSearch.toLowerCase();
    return!q||String(p.poNo).toLowerCase().includes(q)||p.vendor.toLowerCase().includes(q);
  });
  if(!filtered.length)return'<div class="empty"><div class="empty-icon">📋</div>No purchase orders found</div>';
  return filtered.map(renderPOCard).join('');
}

function renderPOCard(p){
  var rcvd=(p.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var cq=p.cancelledQty||0;
  var pct=Math.min(100,Math.round(rcvd/p.totalQty*100));
  var done=STEPS.filter(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}).length;
  var total=STEPS.length;
  var stBadge=p.status==='cancelled'?'<span class="badge b-red">❌ Cancelled</span>'
    :done===total?'<span class="badge b-green">✅ Complete</span>'
    :done===0?'<span class="badge b-gray">⏳ Not Started</span>'
    :'<span class="badge b-amber">Step '+done+'/'+total+'</span>';
  var rcvdTxt=rcvd+(cq>0?'<span style="color:var(--red);font-size:10px"> (+'+cq+' cancelled)</span>':'');

  return'<div class="po-card">'
    +'<div class="po-header" onclick="togglePO(\''+p.id+'\')">'
    +'<div style="flex:1;min-width:0">'
    +'<div class="flex gap6" style="flex-wrap:wrap">'
    +'<span class="po-num">PO #'+esc(p.poNo)+'</span>'
    +'<span class="badge '+(p.type==='COLOR'?'b-blue':'b-purple')+'">'+(p.type==='COLOR'?'🎨':'⚗️')+' '+p.type+'</span>'
    +stBadge+'</div>'
    +'<div class="po-meta">'
    +'<span>🏢 '+esc(p.vendor)+'</span>'
    +'<span>📦 '+rcvdTxt+'/'+p.totalQty+'</span>'
    +'<span>📅 '+fmtDate(p.entryDate)+'</span>'
    +'<span>⏳ '+p.leadDays+'d lead</span>'
    +'</div>'
    +(pct>0&&pct<100?'<div class="partial-bar"><div class="partial-fill" style="width:'+pct+'%"></div></div>':'')
    +'</div>'
    +'<div class="chevron" id="chv-'+p.id+'">▼</div>'
    +'</div>'
    +'<div class="po-body hidden" id="pob-'+p.id+'">'+renderPOBody(p)+'</div>'
    +'</div>';
}

function renderPOBody(p){
  var u=USERS[S.user],isAdmin=u.role==='admin';
  var rcvd=(p.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var cq=p.cancelledQty||0;
  var html='';
  if(p.status==='cancelled')html+='<div class="alert alert-danger">❌ Cancelled: '+esc(p.cancelRemark||'No reason given')+'</div>';
  if(cq>0&&p.status!=='cancelled')html+='<div class="alert alert-warn">⚠️ '+cq+' units cancelled — not expected.</div>';

  STEPS.forEach(function(sd){
    var step=p.steps[sd.code]||{done:false};
    var pl=p.planned[sd.code];
    var late=!step.done&&isLate(pl,null);
    var dotCls=step.done?'sc-done':late?'sc-late':'sc-pending';
    var prereqMet=true,prereqMsg='';
    if(sd.code==='2'&&!(p.steps['1']&&p.steps['1'].done)){prereqMet=false;prereqMsg='Waiting: Issue PO must be done first';}
    if((sd.code==='5'||sd.code==='6')&&!(p.steps['3']&&p.steps['3'].done)){prereqMet=false;prereqMsg='Waiting: Material Receiving must be done first';}
    var canDo=u.steps.indexOf(sd.code)>=0&&!step.done&&p.status!=='cancelled'&&prereqMet;
    var canUndo=isAdmin&&step.done&&p.status!=='cancelled';
    html+='<div class="step-item">'
      +'<div class="step-dot '+dotCls+'">'+(step.done?'✓':sd.code)+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="step-name">'+sd.label+'</div>'
      +'<div class="step-meta">'
      +'<span>📅 '+fmt(pl)+'</span>'
      +(step.done?'<span style="color:'+(isLate(pl,step.actualDate)?'var(--red)':'var(--green)')+'">✓ Done: '+fmt(step.actualDate)+'</span>':'')
      +(late?'<span style="color:var(--red)">⚠ Overdue</span>':'')
      +(!step.done&&!prereqMet&&u.steps.indexOf(sd.code)>=0?'<span style="color:var(--text3);font-size:10px">🔒 '+prereqMsg+'</span>':'')
      +'</div>'
      +(step.remarks?'<div style="font-size:11px;color:var(--text3);margin-top:2px">💬 '+esc(step.remarks)+'</div>':'')
      +'</div>'
      +'<div style="display:flex;gap:5px;flex-shrink:0">'
      +(canDo?'<button class="btn btn-success btn-sm" onclick="openMarkDone(\''+p.id+'\',\''+sd.code+'\')">✓ Mark Done</button>':'')
      +(canUndo?'<button class="btn btn-amber btn-sm" onclick="undoMarkDone(\''+p.id+'\',\''+sd.code+'\')">↩ Undo</button>':'')
      +'</div></div>';
  });

  if((p.receivings||[]).length){
    html+='<hr class="divider"/><div class="section-lbl">Receiving History</div>';
    p.receivings.forEach(function(r){
      html+='<div class="rcv-item">'
        +'<div class="flex gap8"><span class="badge b-green">+'+r.qty+' units</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+fmt(r.date)+'</span>'
        +(r.invoiceImg?'<a href="'+r.invoiceImg+'" target="_blank" style="font-size:11px">📷 View Invoice</a>':'')
        +'</div>'
        +(r.remarks?'<div style="font-size:11px;color:var(--text3)">'+esc(r.remarks)+'</div>':'')
        +'</div>';
    });
  }

  if(p.status!=='cancelled'){
    html+='<hr class="divider"/><div class="flex gap6" style="flex-wrap:wrap">';
    html+='<button class="btn btn-danger btn-sm" onclick="openCancel(\''+p.id+'\')">✕ Cancel PO</button>';
    var remaining=p.totalQty-rcvd-cq;
    if(remaining>0)html+='<button class="btn btn-amber btn-sm" onclick="openPartialCancel(\''+p.id+'\')">📦 Cancel Remaining Qty</button>';
    if(isAdmin)html+='<button class="btn btn-ghost btn-sm" onclick="openEditPO(\''+p.id+'\')">✏️ Edit PO</button>';
    html+='</div>';
  }
  if(isAdmin)html+='<div class="mt8"><button class="btn btn-danger btn-sm" onclick="deletePO(\''+p.id+'\')" style="opacity:.6">🗑 Delete PO</button></div>';
  return html;
}

async function submitPO(){
  var poNo=(document.getElementById('f-pono')||{}).value||'';
  var vendor=(document.getElementById('f-vendor')||{}).value||'';
  var qty=parseInt((document.getElementById('f-qty')||{}).value||'0');
  var lead=parseInt((document.getElementById('f-lead')||{}).value||'0');
  if(!poNo.trim()||!vendor||!qty||!lead){toast('All fields are required','danger');return;}
  var now=new Date().toISOString();
  var planned=calcPlanned(now,lead);
  var steps={};
  STEPS.forEach(function(sd){steps[sd.code]={done:false,actualDate:null,remarks:'',checklistAnswers:{}};});
  try{
    await dbCreatePO({type:S.fmsType,poNo:poNo.trim(),vendor,totalQty:qty,leadDays:lead,
      entryDate:now,entryBy:S.user,planned,steps,receivings:[],cancelledQty:0,cancelRemark:''});
    closeModal();toast('PO created successfully ✓','success');
    await loadData(false);
  }catch(e){toast('Error creating PO','danger');}
}

// ══════════════════════════════════════════════════════════════
// MARK DONE
// ══════════════════════════════════════════════════════════════
var _md={};
function openMarkDone(poId,stepCode){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var sd=STEPS.find(function(s){return s.code===stepCode;});
  _md={poId,stepCode,checklist:{},invoiceImg:null,invoiceFile:''};
  var isRcv=stepCode==='3',isStore=stepCode==='5';
  var rcvdSoFar=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var body='';
  if(isRcv){
    body+='<div class="form-group"><label class="lbl">Quantity Received</label>'
      +'<div class="alert alert-info" style="margin-bottom:8px">📦 Ordered: '+po.totalQty+' &nbsp;|&nbsp; Received so far: '+rcvdSoFar+'</div>'
      +'<input class="inp" type="number" id="md-qty" placeholder="Enter qty for this delivery"/></div>'
      +'<div class="form-group"><label class="lbl">Invoice Photo (mandatory)</label>'
      +'<label class="file-area" id="md-file-lbl" for="md-file-inp">📷 Tap to upload invoice photo</label>'
      +'<input type="file" id="md-file-inp" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>'
      +'</div>';
  }
  if(isStore){
    body+='<div class="section-lbl" style="margin-bottom:10px">Store & Daybook Checklist (ST-1)</div>';
    CHECKLIST.forEach(function(q){
      body+='<div class="cl-item"><div><div class="cl-q-en">'+q.en+'</div><div class="cl-q-hi">'+q.hi+'</div></div>'
        +'<div class="cl-btns">'
        +'<button class="cl-btn yes" id="cl-y-'+q.id+'" onclick="setCheck(\''+q.id+'\',\'yes\')">✓ हाँ</button>'
        +'<button class="cl-btn no" id="cl-n-'+q.id+'" onclick="setCheck(\''+q.id+'\',\'no\')">✗ नहीं</button>'
        +'</div></div>';
    });
    body+='<div style="margin-top:8px"></div>';
  }
  body+='<div class="form-group"><label class="lbl">Remarks (optional)</label>'
    +'<textarea class="inp" id="md-remarks" rows="2" placeholder="Any notes..."></textarea></div>';
  showModal('✅ Mark Done — '+sd.label,body,
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-success" onclick="submitMarkDone()">✓ Confirm Done</button>'
  );
}
function setCheck(qid,val){
  _md.checklist[qid]=val;
  var ye=document.getElementById('cl-y-'+qid),no=document.getElementById('cl-n-'+qid);
  if(ye)ye.className='cl-btn yes'+(val==='yes'?' active':'');
  if(no)no.className='cl-btn no'+(val==='no'?' active':'');
}
function handleFile(inp){
  var f=inp.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    _md.invoiceImg=e.target.result;_md.invoiceFile=f.name;
    var l=document.getElementById('md-file-lbl');
    if(l){l.className='file-area done';l.textContent='✓ '+f.name;}
  };
  reader.readAsDataURL(f);
}
async function submitMarkDone(){
  var po=S.pos.find(function(p){return p.id===_md.poId;});if(!po)return;
  var sc=_md.stepCode,isRcv=sc==='3',isStore=sc==='5';
  var remarks=(document.getElementById('md-remarks')||{}).value||'';
  var now=new Date().toISOString();
  var updated=JSON.parse(JSON.stringify(po));
  if(isRcv){
    var qty=parseInt((document.getElementById('md-qty')||{}).value||'0');
    if(!qty||qty<=0){toast('Enter received quantity','danger');return;}
    if(!_md.invoiceImg){toast('Invoice photo is mandatory','danger');return;}
    var rcvdSoFar=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
    updated.receivings.push({qty,date:now,invoiceImg:_md.invoiceImg,invoiceFile:_md.invoiceFile,remarks});
    if(rcvdSoFar+qty>=po.totalQty){
      updated.steps['3']={done:true,actualDate:now,remarks,checklistAnswers:{}};
      var pd=calcPostRcv(now);updated.planned['5']=pd['5'];updated.planned['6']=pd['6'];
    }
  }else{
    if(isStore&&Object.keys(_md.checklist).length<CHECKLIST.length){toast('Please answer all checklist questions','danger');return;}
    updated.steps[sc]={done:true,actualDate:now,remarks,checklistAnswers:isStore?_md.checklist:{}};
  }
  try{
    await dbUpdatePO(po.id,{steps:updated.steps,planned:updated.planned,receivings:updated.receivings});
    closeModal();toast('Step marked as done ✓','success');
    await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

// ══════════════════════════════════════════════════════════════
// CANCEL / PARTIAL CANCEL / EDIT / DELETE / UNDO
// ══════════════════════════════════════════════════════════════
function openCancel(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  showModal('❌ Cancel Purchase Order',
    '<div class="alert alert-warn">⚠️ This will cancel PO #'+esc(po.poNo)+'. Record will be kept.</div>'
    +'<div class="form-group"><label class="lbl">Reason for cancellation</label>'
    +'<textarea class="inp" id="cancel-remark" rows="3" placeholder="Enter reason..."></textarea></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Back</button>'
    +'<button class="btn btn-danger" onclick="confirmCancel(\''+poId+'\')">Confirm Cancel</button>'
  );
}
async function confirmCancel(poId){
  var remark=(document.getElementById('cancel-remark')||{}).value||'';
  try{
    await dbUpdatePO(poId,{status:'cancelled',cancelRemark:remark});
    closeModal();toast('PO cancelled','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

function openPartialCancel(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var rcvd=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var remaining=po.totalQty-rcvd-(po.cancelledQty||0);
  showModal('📦 Cancel Remaining Quantity',
    '<div class="alert alert-info">PO #'+esc(po.poNo)+' — Ordered: '+po.totalQty+' | Received: '+rcvd+' | Remaining: '+remaining+'</div>'
    +'<div class="form-group"><label class="lbl">Quantity to cancel (max '+remaining+')</label>'
    +'<input class="inp" type="number" id="cq-qty" max="'+remaining+'" placeholder="'+remaining+'"/></div>'
    +'<div class="form-group"><label class="lbl">Reason</label>'
    +'<textarea class="inp" id="cq-reason" rows="2" placeholder="Why is this qty not coming?"></textarea></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Back</button>'
    +'<button class="btn btn-danger" onclick="confirmPartialCancel(\''+poId+'\','+remaining+')">Confirm</button>'
  );
}
async function confirmPartialCancel(poId,maxQty){
  var qty=parseInt((document.getElementById('cq-qty')||{}).value||'0');
  var reason=(document.getElementById('cq-reason')||{}).value||'';
  if(!qty||qty<=0||qty>maxQty){toast('Enter a valid quantity (1 to '+maxQty+')','danger');return;}
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var newCQ=(po.cancelledQty||0)+qty;
  var rcvd=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var update={cancelledQty:newCQ};
  if(rcvd+newCQ>=po.totalQty&&!(po.steps['3']&&po.steps['3'].done)){
    var now=new Date().toISOString();
    var newSteps=JSON.parse(JSON.stringify(po.steps));
    newSteps['3']={done:true,actualDate:now,remarks:qty+' units cancelled: '+reason,checklistAnswers:{}};
    var pd=calcPostRcv(now);
    update.steps=newSteps;
    update.planned={...po.planned,'5':pd['5'],'6':pd['6']};
  }
  try{
    await dbUpdatePO(poId,update);
    closeModal();toast(qty+' units marked as cancelled','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

function openEditPO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var vOpts=S.vendors.map(function(v){return'<option value="'+esc(v)+'"'+(v===po.vendor?' selected':'')+'>'+esc(v)+'</option>';}).join('');
  showModal('✏️ Edit PO #'+esc(po.poNo),
    '<div class="form-row"><div class="form-group"><label class="lbl">PO Number</label>'
    +'<input class="inp" id="ep-pono" value="'+esc(po.poNo)+'"/></div>'
    +'<div class="form-group"><label class="lbl">Vendor</label>'
    +'<select class="inp" id="ep-vendor">'+vOpts+'</select></div></div>'
    +'<div class="form-row"><div class="form-group"><label class="lbl">Total Qty Ordered</label>'
    +'<input class="inp" type="number" id="ep-qty" value="'+po.totalQty+'"/></div>'
    +'<div class="form-group"><label class="lbl">Lead Time (days)</label>'
    +'<input class="inp" type="number" id="ep-lead" value="'+po.leadDays+'"/></div></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-primary" onclick="submitEditPO(\''+poId+'\')">Save Changes</button>'
  );
}
async function submitEditPO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var poNo=(document.getElementById('ep-pono')||{}).value||'';
  var vendor=(document.getElementById('ep-vendor')||{}).value||'';
  var qty=parseInt((document.getElementById('ep-qty')||{}).value||'0');
  var lead=parseInt((document.getElementById('ep-lead')||{}).value||'0');
  if(!poNo.trim()||!vendor||!qty||!lead){toast('All fields are required','danger');return;}
  var planned=lead!==po.leadDays?calcPlanned(po.entryDate,lead):po.planned;
  try{
    await dbUpdatePO(poId,{poNo:poNo.trim(),vendor,totalQty:qty,leadDays:lead,planned});
    closeModal();toast('PO updated','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

async function deletePO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  if(!confirm('Permanently DELETE PO #'+po.poNo+'? This cannot be undone.'))return;
  try{
    await dbDeletePO(poId);
    toast('PO deleted','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

async function undoMarkDone(poId,stepCode){
  if(!confirm('Remove "Mark Done" for this step? It will go back to pending.'))return;
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var newSteps=JSON.parse(JSON.stringify(po.steps));
  newSteps[stepCode]={done:false,actualDate:null,remarks:'',checklistAnswers:{}};
  var newPlanned={...po.planned};
  if(stepCode==='3'){newPlanned['5']=null;newPlanned['6']=null;}
  try{
    await dbUpdatePO(poId,{steps:newSteps,planned:newPlanned});
    toast('Step reset to pending','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

// ══════════════════════════════════════════════════════════════
// MIS
// ══════════════════════════════════════════════════════════════
function renderMIS(c){
  var now=new Date(),day=now.getDay(),off=day===0?-6:1-day;
  var mon=new Date(now);mon.setDate(now.getDate()+off);mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var prev=c.querySelector&&c.querySelector('#mis-ws');
  var wsVal=prev?prev.value:mon.toISOString().split('T')[0];
  var prev2=c.querySelector&&c.querySelector('#mis-we');
  var weVal=prev2?prev2.value:sun.toISOString().split('T')[0];

  var html='<div class="card"><div class="card-title">📊 MIS Report — Weekly</div>'
    +'<div class="form-row">'
    +'<div class="form-group"><label class="lbl">Week Start (Monday)</label>'
    +'<input type="date" class="inp" id="mis-ws" value="'+wsVal+'" onchange="renderMISRefresh()"/></div>'
    +'<div class="form-group"><label class="lbl">Week End (Sunday)</label>'
    +'<input type="date" class="inp" id="mis-we" value="'+weVal+'" onchange="renderMISRefresh()"/></div>'
    +'</div></div>';

  var ws=new Date(wsVal);ws.setHours(0,0,0,0);
  var we=new Date(weVal);we.setHours(23,59,59,999);
  var stepData={};
  STEPS.forEach(function(sd){
    var planned=0,done=0,late=0;
    if(sd.scored){
      S.pos.forEach(function(p){
        if(p.status==='cancelled')return;
        var pl=p.planned[sd.code];if(!pl)return;
        var plDate=new Date(pl);
        if(plDate>=ws&&plDate<=we){
          planned++;
          var step=p.steps[sd.code];
          if(step&&step.done){done++;if(isLate(pl,step.actualDate))late++;}
        }
      });
    }
    var score=sd.scored&&planned>0?Math.round((done/planned*100-100)*100)/100:null;
    stepData[sd.code]={planned,done,late,score,notDone:planned-done,scored:sd.scored};
  });

  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px">';
  ['abhishek','ajay'].forEach(function(uid){
    var u=USERS[uid];var tp=0,td=0,tl=0;
    STEPS.forEach(function(sd){if(!sd.scored||u.steps.indexOf(sd.code)<0)return;var d=stepData[sd.code];tp+=d.planned;td+=d.done;tl+=d.late;});
    var combined=tp>0?Math.round((td/tp*100-100)*100)/100:null;
    var scoreColor=combined===null||combined===0?'var(--green)':'var(--red)';
    var scoreTxt=combined===null?'—':combined===0?'0 ✓':combined;
    html+='<div class="card">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
      +'<div class="user-avatar" style="background:'+u.color[0]+';color:'+u.color[1]+'">'+u.name.charAt(0)+'</div>'
      +'<div class="card-title" style="margin:0">'+u.name+'</div></div>'
      +'<div class="stats-grid" style="margin-bottom:10px">'
      +'<div class="stat-card"><div class="stat-label">Planned</div><div class="stat-value">'+tp+'</div></div>'
      +'<div class="stat-card"><div class="stat-label">Done</div><div class="stat-value" style="color:var(--green)">'+td+'</div></div>'
      +'<div class="stat-card"><div class="stat-label">Late</div><div class="stat-value" style="color:'+(tl?'var(--amber)':'var(--text2)')+'">'+tl+'</div></div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">'
      +'<span style="font-size:12px;color:var(--text2);font-weight:600">Combined Score</span>'
      +'<span style="font-size:20px;font-weight:700;font-family:monospace;color:'+scoreColor+'">'+scoreTxt+'</span>'
      +'</div></div>';
  });
  html+='</div>';

  html+='<div class="card"><div class="card-title">Step-wise Breakdown</div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr>'
    +'<th>Step</th><th>Doer</th><th>Planned</th><th>Done</th><th>Late</th><th>Not Done</th><th>Score</th>'
    +'</tr></thead><tbody>';
  STEPS.forEach(function(sd){
    var d=stepData[sd.code];
    var scoreColor=d.score===null||d.score===0?'var(--text2)':'var(--red)';
    var scoreTxt=!sd.scored?'<span style="font-size:11px;color:var(--text3)">Not scored</span>'
      :d.score===null?'—':d.score===0?'<span style="color:var(--green)">0 ✓</span>'
      :'<span style="color:'+scoreColor+';font-weight:700">'+d.score+'</span>';
    html+='<tr><td><div style="font-weight:600">'+sd.label+'</div><div style="font-size:11px;color:var(--text3)">'+sd.how+'</div></td>'
      +'<td>'+(USERS[sd.doer]?USERS[sd.doer].name:'—')+'</td>'
      +(sd.scored
        ?'<td>'+d.planned+'</td><td style="color:var(--green);font-weight:600">'+d.done+'</td>'
         +'<td style="color:'+(d.late?'var(--amber)':'var(--text2)')+'">'+d.late+'</td>'
         +'<td style="color:'+(d.notDone?'var(--red)':'var(--text2)')+'">'+d.notDone+'</td>'
        :'<td colspan="4" style="color:var(--text3);font-size:11px">No planned date — not scored</td>'
      )
      +'<td>'+scoreTxt+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  c.innerHTML=html;
}
function renderMISRefresh(){renderMIS(document.getElementById('main-content'));}

function renderAdmin(c){

      +'<div class="card"><div class="card-title">All PO Records</div><div style="overflow-x:auto"><table class="tbl">'
      +'<thead><tr><th>PO No</th><th>Vendor</th><th>Ordered</th><th>Received</th><th>Lead</th><th>Date</th><th>Status</th></tr></thead><tbody>';
    S.pos.forEach(function(p){
      var rcvd=(p.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
      var done=STEPS.filter(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}).length;
      var stBadge=p.status==='cancelled'?'<span class="badge b-red">Cancelled</span>'
        :done===STEPS.length?'<span class="badge b-green">Complete</span>'
        :'<span class="badge b-amber">'+done+'/'+STEPS.length+'</span>';
      html+='<tr><td style="font-family:monospace;font-weight:700">'+esc(p.poNo)+'</td>'
        +'<td>'+esc(p.vendor)+'</td><td>'+p.totalQty+'</td><td>'+rcvd+'</td>'
        +'<td>'+p.leadDays+'d</td><td>'+fmtDate(p.entryDate)+'</td><td>'+stBadge+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }
  c.innerHTML=html;
}
function setAdminTab(t){S.adminTab=t;render();}
async function addVendor(){
  var inp=document.getElementById('new-vendor');if(!inp)return;
  var name=inp.value.trim().toUpperCase();if(!name)return;
  try{S.vendors=await dbAddVendor(S.fmsType,name);inp.value='';render();toast('Vendor added','success');}

async function removeVendor(name){
