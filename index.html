<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Anuradha Textile — FMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;--bg2:#ffffff;--bg3:#f0f3f9;--bg4:#e4e9f4;
  --border:#dde3f0;--shadow:0 2px 12px rgba(60,80,140,.08);
  --text:#1a1e2e;--text2:#4a5270;--text3:#8892b0;
  --blue:#3b5bdb;--blue2:#2f4ac2;--blue-dim:#e8edff;--blue-mid:#c5d0ff;
  --green:#2f9e44;--green-dim:#ebfbee;--green-mid:#b2f2bb;
  --amber:#e67700;--amber-dim:#fff3bf;--amber-mid:#ffe066;
  --red:#c92a2a;--red-dim:#fff5f5;--red-mid:#ffc9c9;
  --purple:#6741d9;--purple-dim:#f3f0ff;
  --accent:#3b5bdb;
  --r:10px;--rlg:16px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
.hidden{display:none!important}
a{color:var(--blue);text-decoration:none}

/* ── LOGIN ── */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#e8edff 0%,#f4f6fb 50%,#ebfbee 100%)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;
  padding:40px 36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(60,80,180,.13)}
.login-brand{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:8px}
.login-logo-img{width:72px;height:72px;object-fit:contain;border-radius:50%;
  border:2px solid var(--border);padding:4px;background:#fff}
.login-brand-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.login-brand-sub{font-size:12px;color:var(--text3)}
.user-cards{display:flex;flex-direction:column;gap:8px}
.user-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);
  border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s}
.user-card:hover{border-color:var(--blue);background:var(--blue-dim);transform:translateY(-1px);box-shadow:var(--shadow)}
.user-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.user-card-info{flex:1}
.user-card-name{font-size:13px;font-weight:600;color:var(--text)}
.user-card-role{font-size:11px;color:var(--text3)}
.pin-screen{display:flex;flex-direction:column;align-items:center}
.pin-who{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text)}
.pin-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.pin-dots{display:flex;gap:10px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:all .2s}
.pin-dot.filled{background:var(--blue);transform:scale(1.15)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:240px}
.pin-key{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);
  padding:15px;border-radius:10px;font-size:20px;font-weight:600;transition:all .1s;text-align:center}
.pin-key:hover{background:var(--blue-dim);border-color:var(--blue)}
.pin-key:active{transform:scale(.92)}
.pin-err{font-size:12px;color:var(--red);min-height:18px;margin-top:8px;text-align:center}
.pin-back{background:transparent;color:var(--text3);font-size:13px;margin-top:12px;
  padding:6px 14px;border-radius:8px;border:1px solid var(--border)}
.pin-back:hover{color:var(--text);background:var(--bg3)}

/* ── APP LAYOUT ── */
#app-page{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:var(--bg2);border-bottom:1.5px solid var(--border);
  position:sticky;top:0;z-index:99;height:56px;flex-wrap:wrap;gap:8px;
  box-shadow:0 2px 8px rgba(60,80,140,.06)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;object-fit:contain;border-radius:50%;border:1px solid var(--border)}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.topbar-title span{color:var(--blue)}
.type-tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:8px;border:1px solid var(--border)}
.type-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;
  border:none;background:transparent;color:var(--text2);transition:all .15s}
.type-tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(59,91,219,.3)}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-pill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);
  background:var(--bg3);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sync-indicator{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{font-size:12px;color:var(--text3);background:transparent;
  padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* ── NAV ── */
.nav{display:flex;gap:2px;padding:8px 20px;background:var(--bg2);
  border-bottom:1px solid var(--border);overflow-x:auto}
.nav-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;
  background:transparent;color:var(--text2);border:none;white-space:nowrap;transition:all .15s}
.nav-btn.active{background:var(--blue-dim);color:var(--blue);font-weight:600}
.nav-btn:hover:not(.active){background:var(--bg3);color:var(--text)}

/* ── CONTENT ── */
.content{padding:20px;max-width:1100px;margin:0 auto;width:100%}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);
  padding:14px 16px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);
  padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;gap:3px}
.b-blue{background:var(--blue-dim);color:var(--blue)}
.b-green{background:var(--green-dim);color:var(--green)}
.b-amber{background:var(--amber-dim);color:var(--amber)}
.b-red{background:var(--red-dim);color:var(--red)}
.b-purple{background:var(--purple-dim);color:var(--purple)}
.b-gray{background:var(--bg4);color:var(--text2)}

/* ── PO CARD ── */
.po-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rlg);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.po-card:hover{border-color:var(--blue-mid)}
.po-header{display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 16px;cursor:pointer;gap:8px;transition:background .15s}
.po-header:hover{background:var(--bg3)}
.po-num{font-size:15px;font-weight:700;font-family:monospace;color:var(--text)}
.po-meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.po-meta span{display:flex;align-items:center;gap:3px}
.po-body{padding:14px 16px;border-top:1.5px solid var(--border);background:var(--bg)}
.chevron{color:var(--text3);font-size:16px;transition:transform .2s;flex-shrink:0;margin-top:4px}
.chevron.open{transform:rotate(180deg)}

/* ── STEPS ── */
.step-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;
  transition:border-color .15s}
.step-row:hover{border-color:var(--blue-mid)}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.dot-done{background:var(--green-dim);color:var(--green);border:1.5px solid var(--green-mid)}
.dot-late{background:var(--red-dim);color:var(--red);border:1.5px solid var(--red-mid)}
.dot-pending{background:var(--bg4);color:var(--text3);border:1.5px solid var(--border)}
.step-name{font-size:13px;font-weight:600;color:var(--text)}
.step-dates{font-size:11px;color:var(--text3);margin-top:2px;display:flex;flex-wrap:wrap;gap:6px}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(59,91,219,.25)}
.btn-primary:hover{background:var(--blue2);transform:translateY(-1px)}
.btn-success{background:var(--green-dim);color:var(--green);border:1.5px solid var(--green-mid)}
.btn-success:hover{background:var(--green-mid)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1.5px solid var(--red-mid)}
.btn-danger:hover{background:var(--red-mid)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-amber{background:var(--amber-dim);color:var(--amber);border:1.5px solid var(--amber-mid)}
.btn-amber:hover{background:var(--amber-mid)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(30,40,80,.45);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:20px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(30,40,80,.18)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-ttl{font-size:15px;font-weight:700;color:var(--text)}
.modal-cls{background:transparent;color:var(--text3);font-size:22px;line-height:1;padding:2px 6px;border-radius:6px}
.modal-cls:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:20px}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.lbl{font-size:12px;color:var(--text2);font-weight:600}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);
  padding:10px 12px;border-radius:8px;font-size:14px;transition:border .15s}
.inp:focus{border-color:var(--blue);background:#fff}
select.inp{appearance:none;cursor:pointer}

/* ── ALERTS ── */
.alert{padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:var(--amber-dim);border:1.5px solid var(--amber-mid);color:var(--amber)}
.alert-danger{background:var(--red-dim);border:1.5px solid var(--red-mid);color:var(--red)}
.alert-info{background:var(--blue-dim);border:1.5px solid var(--blue-mid);color:var(--blue)}
.alert-success{background:var(--green-dim);border:1.5px solid var(--green-mid);color:var(--green)}

/* ── CHECKLIST ── */
.cl-item{display:flex;align-items:flex-start;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
.cl-q-en{font-size:12px;font-weight:500;color:var(--text)}
.cl-q-hi{font-size:11px;color:var(--text3);margin-top:1px}
.cl-btns{display:flex;gap:6px;flex-shrink:0}
.cl-btn{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.cl-btn.yes.active{background:var(--green-dim);border-color:var(--green-mid);color:var(--green)}
.cl-btn.no.active{background:var(--red-dim);border-color:var(--red-mid);color:var(--red)}

/* ── FILE UPLOAD ── */
.file-area{border:2px dashed var(--border);border-radius:10px;padding:18px;
  text-align:center;cursor:pointer;color:var(--text3);font-size:12px;display:block;transition:all .15s}
.file-area:hover{border-color:var(--blue);background:var(--blue-dim)}
.file-area.done{border-color:var(--green);background:var(--green-dim);color:var(--green)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 12px;color:var(--text3);font-size:10px;
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1.5px solid var(--border);font-weight:700}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}

/* ── MISC ── */
.flex{display:flex;align-items:center}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}
.ml-a{margin-left:auto}.mt8{margin-top:8px}.mt12{margin-top:12px}
.search{background:var(--bg2);border:1.5px solid var(--border);color:var(--text);
  padding:9px 14px;border-radius:10px;font-size:13px;width:100%;transition:border .15s}
.search:focus{border-color:var(--blue);outline:none;background:#fff}
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.partial-bar{height:5px;background:var(--bg4);border-radius:3px;margin-top:5px;overflow:hidden}
.partial-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--border);margin-bottom:14px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text3);
  background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.score-bad{color:var(--red);font-weight:700;font-family:monospace}
.score-zero{color:var(--text2);font-family:monospace}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:48px;color:var(--text3);font-size:13px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px;margin-top:4px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .content{padding:12px}
  .topbar{padding:0 12px}
  .topbar-title{display:none}
}
</style>

function saveLocal(){try{localStorage.setItem('fms_u',S.user||'');localStorage.setItem('fms_t',S.fmsType);}catch(e){}}

var SB_URL = 'https://rqokafvrlkpwmwwctcta.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxb2thZnZybGtwd213d2N0Y3RhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTkzNzczOCwiZXhwIjoyMDk1NTEzNzM4fQ.vnxNaQhp6-PSC1-82dv_hHIMFSpeFT45SjJ1-HpH7sE';

function sbFetch(method, path, body) {
  return fetch(SB_URL + '/rest/v1/' + path, {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
    if (r.status === 204) return null;
    return r.json();
  });
}

// Map DB row to frontend PO object
function mapPO(r){
  return{
    id:r.id, type:r.type, poNo:r.po_no, vendor:r.vendor,
    totalQty:r.total_qty, leadDays:r.lead_days,
    entryDate:r.entry_date, entryBy:r.entry_by,
    status:r.status, planned:r.planned||{},
    steps:r.steps||{}, receivings:r.receivings||[],
    cancelledQty:r.cancelled_qty||0, cancelRemark:r.cancel_remark||''
  };
}

async function loadData(silent) {
  try {
    setSyncing(true);
    var [rows, vrows] = await Promise.all([
      sbFetch('GET', 'pos?type=eq.' + S.fmsType + '&order=created_at.desc'),
      sbFetch('GET', 'vendors?type=eq.' + S.fmsType + '&order=name.asc&select=name')
    ]);
    S.pos     = rows.map(mapPO);
    S.vendors = vrows.map(function(r) { return r.name; });
    setSynced();
    if (!silent) render(); else renderSilent();
  } catch(e) { setSyncError(); console.error(e); }
}

async function autoSync() {
  try {
    var [rows, vrows] = await Promise.all([
      sbFetch('GET', 'pos?type=eq.' + S.fmsType + '&order=created_at.desc'),
      sbFetch('GET', 'vendors?type=eq.' + S.fmsType + '&order=name.asc&select=name')
    ]);
    S.pos     = rows.map(mapPO);
    S.vendors = vrows.map(function(r) { return r.name; });
    setSynced();
    renderSilent();

}

// ══════════════════════════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════════════════════════
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function setHM(d,h,m){var r=new Date(d);r.setHours(h,m,0,0);return r;}
function calcPlanned(entryDate,leadDays){
  var po=new Date(entryDate),del=addDays(po,leadDays);
  return{'1':setHM(po,18,0).toISOString(),'2':setHM(addDays(del,-2),9,0).toISOString(),
    '3':setHM(del,9,0).toISOString(),'5':null,'6':null};
}
function calcPostRcv(rcvDate){
  return{'5':setHM(new Date(rcvDate),21,0).toISOString(),
    '6':setHM(addDays(new Date(rcvDate),1),20,0).toISOString()};
}
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(iso){
  if(!iso)return'—';
  var d=new Date(iso),h=d.getHours(),ampm=h>=12?'PM':'AM',hh=h%12||12,mm=String(d.getMinutes()).padStart(2,'0');
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+hh+':'+mm+' '+ampm;
}
function fmtDate(iso){
  if(!iso)return'—';
  var d=new Date(iso);return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function isLate(pl,actual){
  if(!pl)return false;
  return(actual?new Date(actual):new Date())>new Date(pl);
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg,type){

    danger:['#fff5f5','#c92a2a','#ffc9c9'],
    info:['#e8edff','#3b5bdb','#c5d0ff']};
  var c=colors[type]||colors.info;
  el.style.cssText='background:'+c[0]+';color:'+c[1]+';border:1.5px solid '+c[2]+
    ';padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;'+
    'box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:280px;animation:slideIn .2s ease';
  el.textContent=msg;
  var root=document.getElementById('toast-root');
  if(root){root.appendChild(el);setTimeout(function(){el.remove();},3000);}
}

  _pinUser=null;_pinEntered='';
  document.getElementById('login-step2').classList.add('hidden');
  document.getElementById('login-step1').classList.remove('hidden');

function buildPinPad(){
  var dots='';for(var i=0;i<4;i++)dots+='<div class="pin-dot" id="pd-'+i+'"></div>';
  document.getElementById('pin-dots').innerHTML=dots;
  var keys=['1','2','3','4','5','6','7','8','9','','0','⌫'],html='';
  keys.forEach(function(k){
    html+=k===''?'<div></div>':'<button class="pin-key" onclick="pinPress(\''+k+'\')">'+k+'</button>';
  });
  document.getElementById('pin-pad').innerHTML=html;
}
function updatePinDots(){
  for(var i=0;i<4;i++){var el=document.getElementById('pd-'+i);if(el)el.className='pin-dot'+(i<_pinEntered.length?' filled':'');}
}
function pinPress(k){
  document.getElementById('pin-error').textContent='';
  if(k==='⌫'){_pinEntered=_pinEntered.slice(0,-1);updatePinDots();return;}
  if(_pinEntered.length>=4)return;
  _pinEntered+=k;updatePinDots();
  if(_pinEntered.length===4)setTimeout(checkPin,100);
}
function checkPin(){
  if(_pinEntered===PINS[_pinUser]){S.user=_pinUser;saveLocal();showApp();}
  else{document.getElementById('pin-error').textContent='❌ Incorrect PIN. Try again.';_pinEntered='';updatePinDots();}
}

function updateStats(){
  var myPending=0,overdue=0;
  S.pos.forEach(function(p){
    if(p.status==='cancelled')return;
    STEPS.forEach(function(sd){
      var step=p.steps[sd.code];
      if(step&&step.done)return;
      if(USERS[S.user].steps.indexOf(sd.code)>=0)myPending++;
      if(isLate(p.planned[sd.code],null))overdue++;
    });
  });
  var el1=document.getElementById('stat-total');
  var el2=document.getElementById('stat-pending');
  var el3=document.getElementById('stat-overdue');
  if(el1)el1.textContent=S.pos.length;
  if(el2){el2.textContent=myPending;el2.style.color=myPending?'var(--amber)':'var(--green)';}
  if(el3){el3.textContent=overdue;el3.style.color=overdue?'var(--red)':'var(--green)';}
}

function buildPOList(){
  var filtered=S.pos.filter(function(p){
    if(S.dashFilter==='active'){
      if(p.status==='cancelled')return false;
      if(STEPS.every(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}))return false;
    }
    if(S.dashFilter==='complete'){
      if(p.status==='cancelled')return false;
      if(!STEPS.every(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}))return false;
    }
    if(S.dashFilter==='cancelled'&&p.status!=='cancelled')return false;
    var q=S.dashSearch.toLowerCase();
    return!q||String(p.poNo).toLowerCase().includes(q)||p.vendor.toLowerCase().includes(q);
  });
  if(!filtered.length)return'<div class="empty"><div class="empty-icon">📋</div>No purchase orders found</div>';
  return filtered.map(renderPOCard).join('');
}

function renderPOCard(p){
  var rcvd=(p.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var cq=p.cancelledQty||0;
  var pct=Math.min(100,Math.round(rcvd/p.totalQty*100));
  var done=STEPS.filter(function(sd){return p.steps[sd.code]&&p.steps[sd.code].done;}).length;
  var total=STEPS.length;
  var stBadge=p.status==='cancelled'?'<span class="badge b-red">❌ Cancelled</span>'
    :done===total?'<span class="badge b-green">✅ Complete</span>'
    :done===0?'<span class="badge b-gray">⏳ Not Started</span>'
    :'<span class="badge b-amber">Step '+done+'/'+total+'</span>';
  var rcvdTxt=rcvd+(cq>0?'<span style="color:var(--red);font-size:10px"> (+'+cq+' cancelled)</span>':'');

  return'<div class="po-card">'
    +'<div class="po-header" onclick="togglePO(\''+p.id+'\')">'
    +'<div style="flex:1;min-width:0">'
    +'<div class="flex gap6" style="flex-wrap:wrap">'
    +'<span class="po-num">PO #'+esc(p.poNo)+'</span>'
    +'<span class="badge '+(p.type==='COLOR'?'b-blue':'b-purple')+'">'+(p.type==='COLOR'?'🎨':'⚗️')+' '+p.type+'</span>'
    +stBadge+'</div>'
    +'<div class="po-meta">'
    +'<span>🏢 '+esc(p.vendor)+'</span>'
    +'<span>📦 '+rcvdTxt+'/'+p.totalQty+'</span>'
    +'<span>📅 '+fmtDate(p.entryDate)+'</span>'
    +'<span>⏳ '+p.leadDays+'d lead</span>'
    +'</div>'
    +(pct>0&&pct<100?'<div class="partial-bar"><div class="partial-fill" style="width:'+pct+'%"></div></div>':'')
    +'</div>'
    +'<div class="chevron" id="chv-'+p.id+'">▼</div>'
    +'</div>'
    +'<div class="po-body hidden" id="pob-'+p.id+'">'+renderPOBody(p)+'</div>'
    +'</div>';
}

function renderPOBody(p){
  var u=USERS[S.user],isAdmin=u.role==='admin';
  var rcvd=(p.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var cq=p.cancelledQty||0;
  var html='';
  if(p.status==='cancelled')html+='<div class="alert alert-danger">❌ Cancelled: '+esc(p.cancelRemark||'No reason given')+'</div>';
  if(cq>0&&p.status!=='cancelled')html+='<div class="alert alert-warn">⚠️ '+cq+' units cancelled — not expected.</div>';

  STEPS.forEach(function(sd){
    var step=p.steps[sd.code]||{done:false};
    var pl=p.planned[sd.code];
    var late=!step.done&&isLate(pl,null);
    var dotCls=step.done?'dot-done':late?'dot-late':'dot-pending';
    var prereqMet=true,prereqMsg='';
    if(sd.code==='2'&&!(p.steps['1']&&p.steps['1'].done)){prereqMet=false;prereqMsg='Waiting: Issue PO must be done first';}
    if((sd.code==='5'||sd.code==='6')&&!(p.steps['3']&&p.steps['3'].done)){prereqMet=false;prereqMsg='Waiting: Material Receiving must be done first';}
    var canDo=u.steps.indexOf(sd.code)>=0&&!step.done&&p.status!=='cancelled'&&prereqMet;
    var canUndo=isAdmin&&step.done&&p.status!=='cancelled';
    html+='<div class="step-row">'
      +'<div class="step-dot '+dotCls+'">'+(step.done?'✓':sd.code)+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="step-name">'+sd.label+'</div>'
      +'<div class="step-dates">'
      +'<span>📅 '+fmt(pl)+'</span>'
      +(step.done?'<span style="color:'+(isLate(pl,step.actualDate)?'var(--red)':'var(--green)')+'">✓ Done: '+fmt(step.actualDate)+'</span>':'')
      +(late?'<span style="color:var(--red)">⚠ Overdue</span>':'')
      +(!step.done&&!prereqMet&&u.steps.indexOf(sd.code)>=0?'<span style="color:var(--text3);font-size:10px">🔒 '+prereqMsg+'</span>':'')
      +'</div>'
      +(step.remarks?'<div style="font-size:11px;color:var(--text3);margin-top:2px">💬 '+esc(step.remarks)+'</div>':'')
      +'</div>'
      +'<div style="display:flex;gap:5px;flex-shrink:0">'
      +(canDo?'<button class="btn btn-success btn-sm" onclick="openMarkDone(\''+p.id+'\',\''+sd.code+'\')">✓ Mark Done</button>':'')
      +(canUndo?'<button class="btn btn-amber btn-sm" onclick="undoMarkDone(\''+p.id+'\',\''+sd.code+'\')">↩ Undo</button>':'')
      +'</div></div>';
  });

  if((p.receivings||[]).length){
    html+='<hr class="divider"/><div class="section-title">Receiving History</div>';
    p.receivings.forEach(function(r){
      html+='<div class="step-row" style="flex-direction:column;gap:4px">'
        +'<div class="flex gap8"><span class="badge b-green">+'+r.qty+' units</span>'
        +'<span style="font-size:11px;color:var(--text3)">'+fmt(r.date)+'</span>'
        +(r.invoiceImg?'<a href="'+r.invoiceImg+'" target="_blank" style="font-size:11px">📷 View Invoice</a>':'')
        +'</div>'
        +(r.remarks?'<div style="font-size:11px;color:var(--text3)">'+esc(r.remarks)+'</div>':'')
        +'</div>';
    });
  }

  if(p.status!=='cancelled'){
    html+='<hr class="divider"/><div class="flex gap6" style="flex-wrap:wrap">';
    html+='<button class="btn btn-danger btn-sm" onclick="openCancel(\''+p.id+'\')">✕ Cancel PO</button>';
    var remaining=p.totalQty-rcvd-cq;
    if(remaining>0)html+='<button class="btn btn-amber btn-sm" onclick="openPartialCancel(\''+p.id+'\')">📦 Cancel Remaining Qty</button>';
    if(isAdmin)html+='<button class="btn btn-ghost btn-sm" onclick="openEditPO(\''+p.id+'\')">✏️ Edit PO</button>';
    html+='</div>';
  }
  if(isAdmin)html+='<div class="mt8"><button class="btn btn-danger btn-sm" onclick="deletePO(\''+p.id+'\')" style="opacity:.6">🗑 Delete PO</button></div>';
  return html;
}

var _md={};
function openMarkDone(poId,stepCode){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var sd=STEPS.find(function(s){return s.code===stepCode;});

    body+='<div class="form-group"><label class="lbl">Quantity Received</label>'
      +'<div class="alert alert-info" style="margin-bottom:8px">📦 Ordered: '+po.totalQty+' &nbsp;|&nbsp; Received so far: '+rcvdSoFar+'</div>'
      +'<input class="inp" type="number" id="md-qty" placeholder="Enter qty for this delivery"/></div>'

      +'<input type="file" id="md-file-inp" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>'
      +'</div>';
  }
  if(isStore){
    body+='<div class="section-title" style="margin-bottom:10px">Store & Daybook Checklist (ST-1)</div>';
    CHECKLIST.forEach(function(q){
      body+='<div class="cl-item"><div><div class="cl-q-en">'+q.en+'</div><div class="cl-q-hi">'+q.hi+'</div></div>'
        +'<div class="cl-btns">'
        +'<button class="cl-btn yes" id="cl-y-'+q.id+'" onclick="setCheck(\''+q.id+'\',\'yes\')">✓ हाँ</button>'
        +'<button class="cl-btn no" id="cl-n-'+q.id+'" onclick="setCheck(\''+q.id+'\',\'no\')">✗ नहीं</button>'
        +'</div></div>';
    });
    body+='<div style="margin-top:8px"></div>';
  }
  body+='<div class="form-group"><label class="lbl">Remarks (optional)</label>'
    +'<textarea class="inp" id="md-remarks" rows="2" placeholder="Any notes..."></textarea></div>';
  showModal('✅ Mark Done — '+sd.label,body,
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-success" onclick="submitMarkDone()">✓ Confirm Done</button>'
  );
}
function setCheck(qid,val){
  _md.checklist[qid]=val;
  var ye=document.getElementById('cl-y-'+qid),no=document.getElementById('cl-n-'+qid);
  if(ye)ye.className='cl-btn yes'+(val==='yes'?' active':'');
  if(no)no.className='cl-btn no'+(val==='no'?' active':'');
}
function handleFile(inp){
  var f=inp.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    _md.invoiceImg=e.target.result;_md.invoiceFile=f.name;
    var l=document.getElementById('md-file-lbl');
    if(l){l.className='file-area done';l.textContent='✓ '+f.name;}
  };
  reader.readAsDataURL(f);
}
async function submitMarkDone(){
  var po=S.pos.find(function(p){return p.id===_md.poId;});if(!po)return;
  var sc=_md.stepCode,isRcv=sc==='3',isStore=sc==='5';
  var remarks=(document.getElementById('md-remarks')||{}).value||'';
  var now=new Date().toISOString();
  var updated=JSON.parse(JSON.stringify(po));
  if(isRcv){
    var qty=parseInt((document.getElementById('md-qty')||{}).value||'0');
    if(!qty||qty<=0){toast('Enter received quantity','danger');return;}
    if(!_md.invoiceImg){toast('Invoice photo is mandatory','danger');return;}
    var rcvdSoFar=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
    updated.receivings.push({qty,date:now,invoiceImg:_md.invoiceImg,invoiceFile:_md.invoiceFile,remarks});
    if(rcvdSoFar+qty>=po.totalQty){
      updated.steps['3']={done:true,actualDate:now,remarks,checklistAnswers:{}};
      var pd=calcPostRcv(now);updated.planned['5']=pd['5'];updated.planned['6']=pd['6'];
    }
  }else{
    if(isStore&&Object.keys(_md.checklist).length<CHECKLIST.length){toast('Please answer all checklist questions','danger');return;}
    updated.steps[sc]={done:true,actualDate:now,remarks,checklistAnswers:isStore?_md.checklist:{}};
  }
  try{
    await dbUpdatePO(po.id,{steps:updated.steps,planned:updated.planned,receivings:updated.receivings});
    closeModal();toast('Step marked as done ✓','success');
    await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

function openCancel(poId){

  showModal('❌ Cancel Purchase Order',
    '<div class="alert alert-warn">⚠️ This will cancel PO #'+esc(po.poNo)+'. Record will be kept.</div>'
    +'<div class="form-group"><label class="lbl">Reason for cancellation</label>'
    +'<textarea class="inp" id="cancel-remark" rows="3" placeholder="Enter reason..."></textarea></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Back</button>'
    +'<button class="btn btn-danger" onclick="confirmCancel(\''+poId+'\')">Confirm Cancel</button>'
  );
}
async function confirmCancel(poId){
  var remark=(document.getElementById('cancel-remark')||{}).value||'';
  try{
    await dbUpdatePO(poId,{status:'cancelled',cancelRemark:remark});
    closeModal();toast('PO cancelled','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

function openPartialCancel(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var rcvd=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var remaining=po.totalQty-rcvd-(po.cancelledQty||0);
  showModal('📦 Cancel Remaining Quantity',
    '<div class="alert alert-info">PO #'+esc(po.poNo)+' — Ordered: '+po.totalQty+' | Received: '+rcvd+' | Remaining: '+remaining+'</div>'
    +'<div class="form-group"><label class="lbl">Quantity to cancel (max '+remaining+')</label>'
    +'<input class="inp" type="number" id="cq-qty" max="'+remaining+'" placeholder="'+remaining+'"/></div>'
    +'<div class="form-group"><label class="lbl">Reason</label>'
    +'<textarea class="inp" id="cq-reason" rows="2" placeholder="Why is this qty not coming?"></textarea></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">Back</button>'
    +'<button class="btn btn-danger" onclick="confirmPartialCancel(\''+poId+'\','+remaining+')">Confirm</button>'
  );
}
async function confirmPartialCancel(poId,maxQty){
  var qty=parseInt((document.getElementById('cq-qty')||{}).value||'0');
  var reason=(document.getElementById('cq-reason')||{}).value||'';
  if(!qty||qty<=0||qty>maxQty){toast('Enter a valid quantity (1 to '+maxQty+')','danger');return;}
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var newCQ=(po.cancelledQty||0)+qty;
  var rcvd=(po.receivings||[]).reduce(function(a,r){return a+r.qty;},0);
  var update={cancelledQty:newCQ};
  if(rcvd+newCQ>=po.totalQty&&!(po.steps['3']&&po.steps['3'].done)){
    var now=new Date().toISOString();
    var newSteps=JSON.parse(JSON.stringify(po.steps));
    newSteps['3']={done:true,actualDate:now,remarks:qty+' units cancelled: '+reason,checklistAnswers:{}};
    var pd=calcPostRcv(now);
    update.steps=newSteps;
    update.planned={...po.planned,'5':pd['5'],'6':pd['6']};
  }
  try{
    await dbUpdatePO(poId,update);
    closeModal();toast(qty+' units marked as cancelled','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

function openEditPO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var vOpts=S.vendors.map(function(v){return'<option value="'+esc(v)+'"'+(v===po.vendor?' selected':'')+'>'+esc(v)+'</option>';}).join('');

async function submitEditPO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;

async function deletePO(poId){
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  if(!confirm('Permanently DELETE PO #'+po.poNo+'? This cannot be undone.'))return;
  try{
    await dbDeletePO(poId);
    toast('PO deleted','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}

async function undoMarkDone(poId,stepCode){
  if(!confirm('Remove "Mark Done" for this step? It will go back to pending.'))return;
  var po=S.pos.find(function(p){return p.id===poId;});if(!po)return;
  var newSteps=JSON.parse(JSON.stringify(po.steps));
  newSteps[stepCode]={done:false,actualDate:null,remarks:'',checklistAnswers:{}};
  var newPlanned={...po.planned};
  if(stepCode==='3'){newPlanned['5']=null;newPlanned['6']=null;}
  try{
    await dbUpdatePO(poId,{steps:newSteps,planned:newPlanned});
    toast('Step reset to pending','success');await loadData(false);
  }catch(e){toast('Error — check connection','danger');}
}

// ══════════════════════════════════════════════════════════════
function renderMIS(c){
  var now=new Date(),day=now.getDay(),off=day===0?-6:1-day;
  var mon=new Date(now);mon.setDate(now.getDate()+off);mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  var prev=c.querySelector&&c.querySelector('#mis-ws');
  var wsVal=prev?prev.value:mon.toISOString().split('T')[0];
  var prev2=c.querySelector&&c.querySelector('#mis-we');
  var weVal=prev2?prev2.value:sun.toISOString().split('T')[0];

  var html='<div class="card"><div class="card-title">📊 MIS Report — Weekly</div>'
    +'<div class="form-row">'
    +'<div class="form-group"><label class="lbl">Week Start (Monday)</label>'
    +'<input type="date" class="inp" id="mis-ws" value="'+wsVal+'" onchange="renderMISRefresh()"/></div>'
    +'<div class="form-group"><label class="lbl">Week End (Sunday)</label>'
    +'<input type="date" class="inp" id="mis-we" value="'+weVal+'" onchange="renderMISRefresh()"/></div>'
    +'</div></div>';

  var ws=new Date(wsVal);ws.setHours(0,0,0,0);
  var we=new Date(weVal);we.setHours(23,59,59,999);
  var stepData={};
  STEPS.forEach(function(sd){
    var planned=0,done=0,late=0;
    if(sd.scored){
      S.pos.forEach(function(p){
        if(p.status==='cancelled')return;
        var pl=p.planned[sd.code];if(!pl)return;
        var plDate=new Date(pl);
        if(plDate>=ws&&plDate<=we){
          planned++;
          var step=p.steps[sd.code];
          if(step&&step.done){done++;if(isLate(pl,step.actualDate))late++;}
        }
      });
    }
    var score=sd.scored&&planned>0?Math.round((done/planned*100-100)*100)/100:null;
    stepData[sd.code]={planned,done,late,score,notDone:planned-done,scored:sd.scored};
  });

  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px">';
  ['abhishek','ajay'].forEach(function(uid){
    var u=USERS[uid];var tp=0,td=0,tl=0;
    STEPS.forEach(function(sd){if(!sd.scored||u.steps.indexOf(sd.code)<0)return;var d=stepData[sd.code];tp+=d.planned;td+=d.done;tl+=d.late;});
    var combined=tp>0?Math.round((td/tp*100-100)*100)/100:null;
    var scoreColor=combined===null||combined===0?'var(--green)':'var(--red)';
    var scoreTxt=combined===null?'—':combined===0?'0 ✓':combined;
    html+='<div class="card">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
      +'<div class="user-avatar" style="background:'+u.color[0]+';color:'+u.color[1]+'">'+u.name.charAt(0)+'</div>'
      +'<div class="card-title" style="margin:0">'+u.name+'</div></div>'
      +'<div class="stats-row" style="margin-bottom:10px">'
      +'<div class="stat-card"><div class="stat-lbl">Planned</div><div class="stat-val">'+tp+'</div></div>'
      +'<div class="stat-card"><div class="stat-lbl">Done</div><div class="stat-val" style="color:var(--green)">'+td+'</div></div>'
      +'<div class="stat-card"><div class="stat-lbl">Late</div><div class="stat-val" style="color:'+(tl?'var(--amber)':'var(--text2)')+'">'+tl+'</div></div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">'
      +'<span style="font-size:12px;color:var(--text2);font-weight:600">Combined Score</span>'
      +'<span style="font-size:20px;font-weight:700;font-family:monospace;color:'+scoreColor+'">'+scoreTxt+'</span>'
      +'</div></div>';
  });
  html+='</div>';

  html+='<div class="card"><div class="card-title">Step-wise Breakdown</div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr>'
    +'<th>Step</th><th>Doer</th><th>Planned</th><th>Done</th><th>Late</th><th>Not Done</th><th>Score</th>'
    +'</tr></thead><tbody>';
  STEPS.forEach(function(sd){
    var d=stepData[sd.code];
    var scoreColor=d.score===null||d.score===0?'var(--text2)':'var(--red)';
    var scoreTxt=!sd.scored?'<span style="font-size:11px;color:var(--text3)">Not scored</span>'
      :d.score===null?'—':d.score===0?'<span style="color:var(--green)">0 ✓</span>'
      :'<span style="color:'+scoreColor+';font-weight:700">'+d.score+'</span>';
    html+='<tr><td><div style="font-weight:600">'+sd.label+'</div><div style="font-size:11px;color:var(--text3)">'+sd.how+'</div></td>'
      +'<td>'+(USERS[sd.doer]?USERS[sd.doer].name:'—')+'</td>'
      +(sd.scored
        ?'<td>'+d.planned+'</td><td style="color:var(--green);font-weight:600">'+d.done+'</td>'
         +'<td style="color:'+(d.late?'var(--amber)':'var(--text2)')+'">'+d.late+'</td>'
         +'<td style="color:'+(d.notDone?'var(--red)':'var(--text2)')+'">'+d.notDone+'</td>'
        :'<td colspan="4" style="color:var(--text3);font-size:11px">No planned date — not scored</td>'
      )
      +'<td>'+scoreTxt+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  c.innerHTML=html;
}

// Install prompt for Android
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  var btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', function(){
  var btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'none';
  deferredPrompt = null;
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt=null; });
  }
}
</script>
</body>
